version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - kdd-network

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
    depends_on:
      - qdrant
    networks:
      - kdd-network

networks:
  kdd-network:
    driver: bridge

volumes:
  qdrant_data:
