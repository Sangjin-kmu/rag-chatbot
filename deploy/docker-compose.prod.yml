version: '3.8'

services:
  # Qdrant 벡터 DB (EC2 내부)
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # FastAPI 앱
  app:
    build: ..
    ports:
      - "8000:8000"
    env_file:
      - ../.env.production
    restart: unless-stopped
    volumes:
      - ../uploads:/app/uploads
      - ../data:/app/data
    depends_on:
      - qdrant
    networks:
      - rag-network

networks:
  rag-network:
    driver: bridge

volumes:
  qdrant_data:
