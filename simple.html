<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDD RAG Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 800px;
            height: 600px;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px 20px 0 0;
        }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .header p { font-size: 14px; opacity: 0.9; }
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
        }
        .message.user { justify-content: flex-end; }
        .message.bot { justify-content: flex-start; }
        .bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        .message.user .bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .message.bot .bubble {
            background: white;
            border: 1px solid #ddd;
            color: #333;
        }
        .sources {
            margin-top: 10px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 8px;
            font-size: 12px;
        }
        .input-area {
            padding: 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
        }
        input:focus { border-color: #667eea; }
        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .loading { opacity: 0.6; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 KDD RAG Chatbot</h1>
            <p>국민대학교 학칙 및 학사규정 질의응답</p>
        </div>
        <div class="chat" id="chat">
            <div class="message bot">
                <div class="bubble">안녕하세요! 국민대학교 학칙에 대해 질문해주세요.</div>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="input" placeholder="질문을 입력하세요..." />
            <button id="send">전송</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');
        
        // 테스트용 자동 토큰 생성
        const testToken = 'test-token-' + Date.now();
        
        function addMessage(role, text, sources = null) {
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            
            let html = `<div class="bubble">${text}</div>`;
            
            if (sources && sources.length > 0) {
                html += '<div class="sources"><strong>출처:</strong><br>';
                sources.forEach((s, i) => {
                    html += `[${i+1}] ${s.uri || '문서'} ${s.page ? '(p.' + s.page + ')' : ''}<br>`;
                });
                html += '</div>';
            }
            
            msg.innerHTML = html;
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
        }
        
        async function send() {
            const question = input.value.trim();
            if (!question) return;
            
            input.value = '';
            sendBtn.disabled = true;
            
            addMessage('user', question);
            addMessage('bot', '답변 생성 중...', null);
            
            try {
                const response = await fetch(window.APP_CONFIG.API_BASE + '/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + testToken
                    },
                    body: JSON.stringify({ message: question, history: '' })
                });
                
                const data = await response.json();
                
                // 로딩 메시지 제거
                chat.removeChild(chat.lastChild);
                
                if (response.ok) {
                    addMessage('bot', data.answer, data.sources);
                } else {
                    addMessage('bot', '오류: ' + (data.error || data.detail || '알 수 없는 오류'));
                }
            } catch (error) {
                chat.removeChild(chat.lastChild);
                addMessage('bot', '오류: ' + error.message);
            } finally {
                sendBtn.disabled = false;
                input.focus();
            }
        }
        
        sendBtn.addEventListener('click', send);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') send();
        });
        
        input.focus();
    </script>
</body>
</html>
